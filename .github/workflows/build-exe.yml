name: Build Windows EXE

# When this runs:
#  - Every push to main / master  -> builds the exe and uploads it as a
#    downloadable "artifact" on the Actions run (good for testing).
#  - Every pushed tag like v1.0    -> ALSO publishes a GitHub Release with the
#    zip attached, so end users get a clean download page.
#  - The "Run workflow" button on the Actions tab (manual trigger).
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Allow the workflow's token to create/upload a GitHub Release. Without this,
# repos that default to a read-only token get a 403 on the release step.
permissions:
  contents: write

jobs:
  # Fast, headless logic tests. Runs on every push + PR. The Windows .exe build
  # below depends on this job, so a red test blocks the build AND the release.
  # Keep these tests display-free: they must not import ribbonengine.py (which
  # imports tkinter at module top). factions.py / renderer.py / profiles.py /
  # migrations.py / updater.py are all importable without a display.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        # Tests live in tests/; -t . keeps the repo root on sys.path so they can
        # import the engine modules (renderer, profiles, factions, updater).
        run: python -m unittest discover -s tests -t . -p "test_*.py" -v

  build:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build the .exe
        # --onedir  : produce a folder with the exe + its runtime (fast start,
        #             plays nicely with antivirus, easy to ship data alongside).
        # --windowed: no console window pops up behind the GUI.
        # --name    : the name of the exe / folder.
        # --collect-all tkinterdnd2: bundle the native tkdnd Tcl library that
        #   drag-and-drop needs. Without it, TkinterDnD.Tk() builds its window
        #   then fails to load tkdnd at runtime, leaving a phantom empty "tk"
        #   window and silently disabling file drops.
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "AOER-Ribbon-engine" --collect-all tkinterdnd2 ribbonengine.py

      - name: Copy data folders next to the exe
        # The engine reads its assets AND writes its output in folders next to
        # the exe (assets, factions, Characters, templates, etc.). Ship them
        # alongside so users can edit factions/loadouts and find their output.
        shell: pwsh
        run: |
          $dest = "dist/AOER-Ribbon-engine"
          $folders = @("assets", "factions", "templates", "docs",
                       "Engine Profiles", "loadouts", "ribbonoutput")
          foreach ($f in $folders) {
            if (Test-Path $f) {
              Copy-Item -Recurse -Force $f "$dest/$f"
            }
          }
          if (Test-Path "settings.json") { Copy-Item -Force "settings.json" "$dest/settings.json" }
          if (Test-Path "README.md") { Copy-Item -Force "README.md" "$dest/README.md" }

      - name: Zip it up
        # Bake the version into the asset name on tagged builds so users can
        # tell releases apart at a glance, e.g. AOER-Ribbon-engine-windowsv1.4.zip.
        # github.ref_name is the tag (e.g. "v1.4") on tag builds; untagged
        # builds (main/PR) fall back to the plain name. The chosen filename is
        # exported as ASSET_ZIP so later steps reference the exact file.
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF_NAME } else { "" }
          $zip = "AOER-Ribbon-engine-windows$ver.zip"
          Compress-Archive -Path "dist/AOER-Ribbon-engine/*" -DestinationPath $zip -Force
          "ASSET_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload as a build artifact (download from the Actions run)
        uses: actions/upload-artifact@v4
        with:
          name: AOER-Ribbon-engine-windows
          path: ${{ env.ASSET_ZIP }}

      - name: Publish a Release (only when you push a version tag like v1.0)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_ZIP }}
          # Auto-build the release body from the commits/PRs since the previous
          # tag, so every tagged release gets a changelog without manual notes.
          generate_release_notes: true
